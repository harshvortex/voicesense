<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — VoiceSense</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}" />
  <link rel="icon" type="image/png" sizes="192x192" href="{{ url_for('static', filename='icons/icon-192.png') }}" />
  <meta name="theme-color" content="#7c3aed" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="auth-card">
      <!-- Logo -->
      <div class="auth-header">
        <div class="auth-logo">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="2" />
            <path d="M14 16C14 14.9 14.9 14 16 14H24C25.1 14 26 14.9 26 16V28C26 29.1 25.1 30 24 30H16C14.9 30 14 29.1 14 28V16Z" fill="currentColor" />
            <circle cx="20" cy="23" r="3" fill="white" />
          </svg>
        </div>
        <h1>VoiceSense</h1>
        <p>Sign in to your account</p>
      </div>

      <!-- Form -->
      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            required
            autocomplete="email"
          />
          <span class="error-message" id="emailError"></span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          />
          <span class="error-message" id="passwordError"></span>
        </div>

        <button type="submit" class="auth-button" id="loginBtn">
          <span class="button-text">Sign In</span>
          <span class="button-spinner" style="display: none;">
            <svg class="spinner" viewBox="0 0 50 50">
              <circle cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
            </svg>
          </span>
        </button>

        <span class="form-error" id="formError"></span>
      </form>

      <!-- Divider -->
      <div class="auth-divider">
        <span>Don't have an account?</span>
      </div>

      <!-- Sign Up Link -->
      <a href="{{ url_for('register') }}" class="auth-link">Create a new account</a>
    </div>

    <!-- Footer -->
    <div class="auth-footer">
      <p>
        <a href="{{ url_for('health') }}">Status</a>
        ·
        <a href="#">Privacy</a>
        ·
        <a href="#">Terms</a>
      </p>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const buttonText = loginBtn.querySelector('.button-text');
    const buttonSpinner = loginBtn.querySelector('.button-spinner');
    const formError = document.getElementById('formError');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Clear previous errors
      formError.textContent = '';
      document.getElementById('emailError').textContent = '';
      document.getElementById('passwordError').textContent = '';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        formError.textContent = 'Please fill in all fields';
        return;
      }

      // Show loading state
      loginBtn.disabled = true;
      buttonText.style.display = 'none';
      buttonSpinner.style.display = 'block';

      try {
        const response = await fetch('{{ url_for("login") }}', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ email, password }),
        });

        const data = await response.json();

        if (response.ok) {
          // Redirect to dashboard
          window.location.href = '{{ url_for("dashboard") }}';
        } else {
          formError.textContent = data.error || 'Login failed. Please try again.';
        }
      } catch (error) {
        console.error('Login error:', error);
        formError.textContent = 'An error occurred. Please try again.';
      } finally {
        // Reset button state
        loginBtn.disabled = false;
        buttonText.style.display = 'inline';
        buttonSpinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
