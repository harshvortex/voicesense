<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — VoiceSense</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}" />
  <link rel="icon" type="image/png" sizes="192x192" href="{{ url_for('static', filename='icons/icon-192.png') }}" />
  <meta name="theme-color" content="#7c3aed" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="auth-card">
      <!-- Logo -->
      <div class="auth-header">
        <div class="auth-logo">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="2" />
            <path d="M14 16C14 14.9 14.9 14 16 14H24C25.1 14 26 14.9 26 16V28C26 29.1 25.1 30 24 30H16C14.9 30 14 29.1 14 28V16Z" fill="currentColor" />
            <circle cx="20" cy="23" r="3" fill="white" />
          </svg>
        </div>
        <h1>VoiceSense</h1>
        <p>Create your account</p>
      </div>

      <!-- Form -->
      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            required
            autocomplete="email"
          />
          <span class="error-message" id="emailError"></span>
        </div>

        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="johndoe"
            required
            autocomplete="off"
          />
          <span class="error-message" id="usernameError"></span>
        </div>

        <div class="form-group">
          <label for="displayName">Display Name</label>
          <input
            type="text"
            id="displayName"
            name="displayName"
            placeholder="John Doe"
            autocomplete="name"
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            required
            autocomplete="new-password"
          />
          <span class="error-message" id="passwordError"></span>
          <small>At least 8 characters</small>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            placeholder="••••••••"
            required
            autocomplete="new-password"
          />
          <span class="error-message" id="confirmPasswordError"></span>
        </div>

        <button type="submit" class="auth-button" id="registerBtn">
          <span class="button-text">Create Account</span>
          <span class="button-spinner" style="display: none;">
            <svg class="spinner" viewBox="0 0 50 50">
              <circle cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
            </svg>
          </span>
        </button>

        <span class="form-error" id="formError"></span>
      </form>

      <!-- Divider -->
      <div class="auth-divider">
        <span>Already have an account?</span>
      </div>

      <!-- Sign In Link -->
      <a href="{{ url_for('login') }}" class="auth-link">Sign in instead</a>
    </div>

    <!-- Footer -->
    <div class="auth-footer">
      <p>
        <a href="{{ url_for('health') }}">Status</a>
        ·
        <a href="#">Privacy</a>
        ·
        <a href="#">Terms</a>
      </p>
    </div>
  </div>

  <script>
    const form = document.getElementById('registerForm');
    const registerBtn = document.getElementById('registerBtn');
    const buttonText = registerBtn.querySelector('.button-text');
    const buttonSpinner = registerBtn.querySelector('.button-spinner');
    const formError = document.getElementById('formError');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Clear previous errors
      formError.textContent = '';
      document.getElementById('emailError').textContent = '';
      document.getElementById('usernameError').textContent = '';
      document.getElementById('passwordError').textContent = '';
      document.getElementById('confirmPasswordError').textContent = '';

      const email = document.getElementById('email').value.trim();
      const username = document.getElementById('username').value.trim();
      const displayName = document.getElementById('displayName').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // Validation
      if (!email || !username || !password || !confirmPassword) {
        formError.textContent = 'Please fill in all required fields';
        return;
      }

      if (password.length < 8) {
        document.getElementById('passwordError').textContent = 'Password must be at least 8 characters';
        return;
      }

      if (password !== confirmPassword) {
        document.getElementById('confirmPasswordError').textContent = 'Passwords do not match';
        return;
      }

      // Show loading state
      registerBtn.disabled = true;
      buttonText.style.display = 'none';
      buttonSpinner.style.display = 'block';

      try {
        const response = await fetch('{{ url_for("register") }}', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            email,
            username,
            display_name: displayName,
            password,
          }),
        });

        const data = await response.json();

        if (response.ok) {
          // Show success message and redirect to login
          alert('Account created successfully! Please check your email to verify your account.');
          window.location.href = '{{ url_for("login") }}';
        } else {
          formError.textContent = data.error || 'Registration failed. Please try again.';
        }
      } catch (error) {
        console.error('Registration error:', error);
        formError.textContent = 'An error occurred. Please try again.';
      } finally {
        // Reset button state
        registerBtn.disabled = false;
        buttonText.style.display = 'inline';
        buttonSpinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
